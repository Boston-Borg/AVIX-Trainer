# Render Blueprint — https://render.com/docs/blueprint-spec
# Push this repo to GitHub, then on Render click "New +" → "Blueprint" and
# point it at the repo. Render reads this file and creates the service.
#
# IMPORTANT: ANTHROPIC_API_KEY is intentionally NOT in this file. After the
# service is created, go to its dashboard → Environment → add a secret called
# ANTHROPIC_API_KEY with your real key. That keeps the key out of git.

services:
  - type: web
    name: avx
    runtime: python
    plan: starter             # $7/mo — stays warm 24/7, no cold starts
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false           # forces you to set it in the dashboard, never in git
